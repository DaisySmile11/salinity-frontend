<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <link rel="icon" href="assets/favicon.png"/>
</head>
<body>
<header class="main-header">
  <div class="header-left">
    <div class="logo">Giám sát độ mặn</div>
    <nav class="main-nav">
      <a href="index.html">Trang chủ</a>
<a href="devices.html">Danh sách thiết bị</a>
<a id="navAdmin" href="admin.html" style="display:none;">Admin</a>
    </nav>
  </div>
  <div class="header-right">
    <a id="navAuth" class="nav-auth" href="login.html">Login</a>
    <button class="nav-toggle" aria-label="Menu">☰</button>
  </div>
</header>
<main class="container" style="padding-top:24px">
  <section class="section" style="max-width:760px;margin:0 auto;">
    <div class="admin-login-card" role="region" aria-label="Admin thresholds">
      <h1 class="admin-title" style="margin-bottom:8px">Thiết lập ngưỡng (Thresholds)</h1>
      <div class="admin-msg">Ngưỡng này dùng chung (global) cho toàn bộ website.</div>

      <form id="thresholdForm" class="admin-form" style="margin-top:14px">
        <div class="admin-grid">
          <div class="admin-field">
            <label>Độ mặn thấp (SAL_LOW):</label>
            <input id="t_sal_low" type="number" step="0.1" required />
          </div>
          <div class="admin-field">
            <label>Độ mặn cao (SAL_HIGH):</label>
            <input id="t_sal_high" type="number" step="0.1" required />
          </div>

          <div class="admin-field">
            <label>pH thấp (PH_LOW):</label>
            <input id="t_ph_low" type="number" step="0.1" required />
          </div>
          <div class="admin-field">
            <label>pH cao (PH_HIGH):</label>
            <input id="t_ph_high" type="number" step="0.1" required />
          </div>

          <div class="admin-field">
            <label>Nhiệt độ thấp (TEMP_LOW):</label>
            <input id="t_temp_low" type="number" step="0.1" required />
          </div>
          <div class="admin-field">
            <label>Nhiệt độ cao (TEMP_HIGH):</label>
            <input id="t_temp_high" type="number" step="0.1" required />
          </div>

          <div class="admin-field">
            <label>Pin yếu (BAT_LOW - %):</label>
            <input id="t_bat_low" type="number" step="1" required />
          </div>

          <div class="admin-field">
            <label>Offline sau (OFFLINE_MINUTES - phút):</label>
            <input id="t_offline_minutes" type="number" step="1" required />
          </div>
        </div>

        <button id="saveThresholdBtn" class="admin-submit" type="submit">Lưu ngưỡng</button>
        <div id="thresholdMsg" class="admin-msg" aria-live="polite" style="margin-top:10px"></div>
      </form>
    </div>
  </section>
</main>
<footer class="main-footer">
  <span>Giám sát độ mặn nước © 2025</span>
</footer>
<script type="module" src="assets/js/nav.js"></script>
<script type="module" src="assets/js/admin.js"></script>
</body>
</html>
